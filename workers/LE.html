<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APML - South-Central Luzon Conference</title>
  <meta name="description" content="Meet the APML team of the South-Central Luzon Conference.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link href="../assets/style.css" rel="stylesheet">

  <style>
    /* Subtle hover lift for cards */
    .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
    .team-img { object-fit: cover; object-position: top; border-radius: 12px !important; }
    
    /* Make the whole card clickable like in the original */
    .card-link-wrapper {
      text-decoration: none;
      color: inherit;
      display: block;
      height: 100%;
    }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>

  <main>
    
    <section class="py-5 info-section border-bottom">
      <div class="container-xxl text-center py-4">
        <h1 class="display-5 fw-bold brand-text mb-2 text-uppercase">APML</h1>
        <p class="lead text-secondary mb-0">South-Central Luzon Conference</p>
      </div>
    </section>

    <section class="py-5 bg-white">
      <div class="container-xxl">
        <div class="row justify-content-center g-4">
          
          <div class="col-sm-6 col-md-4 col-lg-3">
            <a href="#bio-president" class="card-link-wrapper">
              <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                <div class="card-body p-3">
                  <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/59f01a78-57d1-44c5-9e87-34b66ac09d83.png" class="img-fluid team-img w-100 mb-3" style="height: 280px;" alt="Name">
                  <h3 class="h6 fw-bold mb-1 brand-text">Name</h3>
                  <p class="small text-secondary fw-semibold mb-0">Position</p>
                </div>
              </div>
            </a>
          </div>

          <div class="col-sm-6 col-md-4 col-lg-3">
            <a href="#bio-secretary" class="card-link-wrapper">
              <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                <div class="card-body p-3">
                  <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/59f01a78-57d1-44c5-9e87-34b66ac09d83.png" class="img-fluid team-img w-100 mb-3" style="height: 280px;" alt="Name">
                  <h3 class="h6 fw-bold mb-1 brand-text">Name</h3>
                  <p class="small text-secondary fw-semibold mb-0">Position</p>
                </div>
              </div>
            </a>
          </div>

          <div class="col-sm-6 col-md-4 col-lg-3">
            <a href="#bio-treasurer" class="card-link-wrapper">
              <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                <div class="card-body p-3">
                  <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/59f01a78-57d1-44c5-9e87-34b66ac09d83.png" class="img-fluid team-img w-100 mb-3" style="height: 280px;" alt="Name">
                  <h3 class="h6 fw-bold mb-1 brand-text">Name</h3>
                  <p class="small text-secondary fw-semibold mb-0">Position</p>
                </div>
              </div>
            </a>
          </div>

        </div>
      </div>
    </section>
  </main>
  
    <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/script.js"></script>

</body>
</html>
