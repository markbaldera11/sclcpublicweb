<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teachers - South-Central Luzon Conference</title>
  <meta name="description" content="Meet the Teachers of the South-Central Luzon Conference schools.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  
  <link href="../assets/style.css" rel="stylesheet">

  <style>
    /* Subtle hover lift for cards */
    .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; }
    .team-img { object-fit: cover; object-position: top; border-radius: 12px !important; }
    
    /* Modern Accordion Styling to replace Elementor's heavy widget */
    .accordion-item {
      border: none;
      margin-bottom: 1rem;
      border-radius: 8px !important;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .accordion-button {
      font-weight: 600;
      color: var(--brand-primary-dark);
      background-color: #fff;
      padding: 1.2rem 1.5rem;
      border: 1px solid #E2E8F0;
      border-radius: 8px !important;
      transition: all 0.3s ease;
    }
    .accordion-button:not(.collapsed) {
      background-color: var(--brand-primary);
      color: #fff;
      border-color: var(--brand-primary);
      box-shadow: none;
      border-bottom-left-radius: 0 !important;
      border-bottom-right-radius: 0 !important;
    }
    .accordion-button:not(.collapsed)::after {
      filter: brightness(0) invert(1);
    }
    .accordion-button:focus {
      box-shadow: none;
    }
    .accordion-body {
      background-color: #F8FAFB;
      border: 1px solid #E2E8F0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 2rem;
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

  <main>
    
    <section class="py-5 info-section border-bottom">
      <div class="container-xxl text-center py-4">
        <h1 class="display-5 fw-bold brand-text mb-2 text-uppercase">Teachers</h1>
        <p class="lead text-secondary mb-0">South-Central Luzon Conference</p>
      </div>
    </section>

    <section class="py-5 bg-white">
      <div class="container-xxl">
        
        <div class="accordion" id="schoolsAccordion">
          
          <div class="accordion-item">
            <h2 class="accordion-header" id="headingOne">
              <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                School Name 1
              </button>
            </h2>
            <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne" data-bs-parent="#schoolsAccordion">
              <div class="accordion-body">
                <div class="row justify-content-center g-4">
                  <div class="col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                      <div class="card-body p-3">
                        <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/pngimg.com-teacher_PNG84-450x574.png" class="img-fluid team-img w-100 mb-3" style="height: 220px;" alt="Teacher 1">
                        <h3 class="h6 fw-bold mb-1 brand-text">Teacher 1</h3>
                        <p class="small text-secondary fw-semibold mb-0">Position</p>
                      </div>
                    </div>
                  </div>
                  <div class="col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                      <div class="card-body p-3">
                        <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/pngimg.com-teacher_PNG84-450x574.png" class="img-fluid team-img w-100 mb-3" style="height: 220px;" alt="Teacher 2">
                        <h3 class="h6 fw-bold mb-1 brand-text">Teacher 2</h3>
                        <p class="small text-secondary fw-semibold mb-0">Position</p>
                      </div>
                    </div>
                  </div>
                  <div class="col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                      <div class="card-body p-3">
                        <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/pngimg.com-teacher_PNG84-450x574.png" class="img-fluid team-img w-100 mb-3" style="height: 220px;" alt="Teacher 3">
                        <h3 class="h6 fw-bold mb-1 brand-text">Teacher 3</h3>
                        <p class="small text-secondary fw-semibold mb-0">Position</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="accordion-item">
            <h2 class="accordion-header" id="headingTwo">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                School Name 2
              </button>
            </h2>
            <div id="collapseTwo" class="accordion-collapse collapse" aria-labelledby="headingTwo" data-bs-parent="#schoolsAccordion">
              <div class="accordion-body">
                <div class="row justify-content-center g-4">
                  <div class="col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                      <div class="card-body p-3">
                        <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/pngimg.com-teacher_PNG84-450x574.png" class="img-fluid team-img w-100 mb-3" style="height: 220px;" alt="Teacher 1">
                        <h3 class="h6 fw-bold mb-1 brand-text">Teacher 1</h3>
                        <p class="small text-secondary fw-semibold mb-0">Position</p>
                      </div>
                    </div>
                  </div>
                  <div class="col-sm-6 col-md-4 col-lg-3">
                    <div class="card border-0 shadow-sm h-100 text-center hover-lift bg-white">
                      <div class="card-body p-3">
                        <img src="https://clcadventist.org/wp-public/wp-content/uploads/2026/02/pngimg.com-teacher_PNG84-450x574.png" class="img-fluid team-img w-100 mb-3" style="height: 220px;" alt="Teacher 2">
                        <h3 class="h6 fw-bold mb-1 brand-text">Teacher 2</h3>
                        <p class="small text-secondary fw-semibold mb-0">Position</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </div> </div>
    </section>
  </main>

<div id="footer-placeholder"></div>

</body>
</html>
